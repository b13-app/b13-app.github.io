<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b13-app | Android Apps</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { background-color: #0d1117; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #58a6ff; }
        
        /* جعل الحاويات تحت بعضها */
        .container { 
            display: flex; 
            flex-direction: column; /* الترتيب عمودي */
            align-items: center; /* توسيط العناصر */
            gap: 30px; 
            margin-top: 20px; 
        }
        
        /* البطاقة تأخذ عرض الشاشة مع هامش بسيط */
        .card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 10px; 
            padding: 20px; 
            width: 90%; /* تأخذ 90% من عرض الشاشة */
            max-width: 500px; /* لا تتجاوز 500 بكسل حتى لا تصبح ضخمة جداً */
            transition: transform 0.3s ease-in-out; 
        }
        
        .card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }

        img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .btn { display: inline-block; background-color: #238636; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; font-size: 18px; margin-top: 10px; }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <h1>b13 Apps</h1>
    <p>مرحباً بك في موقع تطبيقات b13</p>
    
    <div class="container">
        <div class="card">
            <img src="shop-list.png" alt="Shop List">
            <h3>SHOP LIST</h3>
            <a href="https://docs.google.com/uc?export=download&id=1SbzmDdwUsx7NbDJgD8Er0Ldl20sTaJwL" class="btn">تحميل التطبيق</a>
        </div>

        <div class="card">
            <img src="Notepad.png" alt="Debt Book">
            <h3>DEBT BOOK</h3>
            <a href="https://docs.google.com/uc?export=download&id=1Ylh10Qia0NInanLux3zjqu8KmcPerQFe" class="btn">تحميل التطبيق</a>
        </div>

        <div class="card">
            <img src="PUBG.png" alt="PUBG App">
            <h3>PUBG TOOL</h3>
            <a href="https://drive.google.com/file/d/11-f47LSRNbGePJsI-VLcN9s0cneuYpJD/view" class="btn">تحميل التطبيق</a>
        </div>
    </div>

</body>
</html>
