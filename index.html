<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>b13-app | تطبيقات الأندرويد</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased selection:bg-emerald-500 selection:text-white">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-gray-950/70 border-b border-gray-800">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent tracking-wider">b13-app</a>
            <div class="flex items-center gap-4 text-sm text-gray-400">
                <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> متاح للمشاريع</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12 space-y-20">
        
        <section class="text-center space-y-6 max-w-2xl mx-auto pt-6">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-gray-900 border border-gray-800 text-xs text-emerald-400">
                <i class="fab fa-android text-sm"></i> مطور تطبيقات أندرويد
            </div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight leading-tight">
                أهلاً بك، أنا <span class="bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">b13-app</span>
            </h1>
        </section>

        <section class="space-y-8">
            <div class="border-b border-gray-800 pb-4">
                <h2 class="text-2xl font-bold">معرض التطبيقات</h2>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div class="group bg-gray-900/50 border border-gray-800 rounded-3xl p-8 hover:border-emerald-500/50 transition-all duration-300 flex flex-col items-center gap-6 shadow-xl shadow-black/20">
                    
                    <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-3xl overflow-hidden border border-gray-800 shadow-lg transition-transform group-hover:scale-105 group-hover:border-emerald-500/50">
                        <img src="apps/%D8%AF%D9%81%D8%AA%D8%B1%20%D8%A7%D2%A4%D8%AF%D9%8A%D9%85%D9%86.png" alt="SHOP LIST" class="w-full h-full object-cover" onerror="this.src='apps/دفتر الديون.png'">
                    </div>

                    <h3 class="text-2xl font-bold group-hover:text-emerald-400 transition-colors">SHOP LIST</h3>

                    <a href="apps/SHOP_LIST.apk" class="w-full text-center bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-semibold text-base py-3.5 px-6 rounded-2xl transition-colors shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-2">
                        <i class="fab fa-android text-lg"></i> تحميل التطبيق (APK)
                    </a>
                </div>

                <div class="border border-dashed border-gray-800 rounded-3xl p-8 flex flex-col items-center justify-center text-center space-y-3 min-h-[300px]">
                    <div class="w-12 h-12 rounded-full bg-gray-900 border border-gray-800 flex items-center justify-center text-gray-600">
                        <i class="fas fa-plus text-sm"></i>
                    </div>
                    <p class="text-xs text-gray-600">تطبيق جديد قريباً</p>
                </div>

            </div>
        </section>

    </main>

    <footer class="border-t border-gray-900 bg-gray-950/40 py-8 text-center text-xs text-gray-600">
        <p>© 2026 b13-app. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
